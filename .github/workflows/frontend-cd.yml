name: Frontend Continuous Deployment

on:
  push:
    branches:
      - main
    # This ensures the pipeline ONLY runs if you edit frontend files
    paths:
      - 'apps/frontend/**' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./apps/frontend
        run: npm install

      - name: Build React App
        working-directory: ./apps/frontend
        # If using Vite, the output folder is 'dist'. If Create React App, it's 'build'.
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3 Bucket
        # Replace 'dist' with 'build' if you used Create React App
        run: aws s3 sync ./apps/frontend/dist s3://${{ secrets.AWS_FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_ID }} --paths "/*"